[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd backend && gunicorn hallora_backend.wsgi --bind 0.0.0.0:$PORT"
releaseCommand = "cd backend && python manage.py migrate --noinput"
restartPolicyType = "on_failure"
